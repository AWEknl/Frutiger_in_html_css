<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aqua Background — Frutiger Aero 纯背景</title>
<style>
/* ===================== Frutiger Aero Core Palette ===================== */
:root {
  --aero-sky: #4fc3f7;
  --aero-sky-deep: #0288d1;
  --aero-grass: #8bc34a;
  --aero-grass-deep: #558b2f;
  --aero-aqua: #00e5ff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Segoe UI", "Frutiger", "Helvetica Neue", Arial, sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  position: relative;
}

/* ===================== Aurora Background ===================== */
.aurora-bg {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  z-index: 1;
  background:
    linear-gradient(135deg, #001e3c 0%, #003d5c 15%, #006064 35%, #0288d1 55%, #4fc3f7 75%, #81d4fa 100%);
}
.aurora-bg::before {
  content: '';
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse 80% 50% at 20% 30%, rgba(0,229,255,0.35), transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 20%, rgba(118,255,3,0.2), transparent 55%),
    radial-gradient(ellipse 70% 50% at 60% 70%, rgba(24,255,255,0.25), transparent 60%),
    radial-gradient(ellipse 50% 30% at 30% 80%, rgba(129,212,250,0.3), transparent 55%);
  animation: auroraDrift 20s ease-in-out infinite alternate;
}
.aurora-bg::after {
  content: '';
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse 40% 60% at 70% 50%, rgba(0,229,255,0.15), transparent 70%),
    radial-gradient(ellipse 50% 40% at 10% 60%, rgba(118,255,3,0.1), transparent 70%);
  animation: auroraDrift2 15s ease-in-out infinite alternate-reverse;
}
@keyframes auroraDrift {
  0% { transform: translate(0,0) scale(1); opacity: 0.9; }
  50% { transform: translate(-2%, 1%) scale(1.05); opacity: 1; }
  100% { transform: translate(2%, -1%) scale(1.02); opacity: 0.85; }
}
@keyframes auroraDrift2 {
  0% { transform: translate(0,0) scale(1.1); opacity: 0.6; }
  100% { transform: translate(3%, -2%) scale(0.95); opacity: 0.9; }
}

/* ===================== Grass at Bottom ===================== */
.grass-layer {
  position: fixed;
  bottom: 0; left: 0; width: 100%; height: 120px;
  z-index: 5;
  background:
    linear-gradient(180deg, transparent 0%, rgba(85,139,47,0.3) 30%, var(--aero-grass-deep) 100%);
}
.grass-layer::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; width: 100%; height: 100%;
  background-image:
    radial-gradient(ellipse 3px 12px at 5% 90%, var(--aero-grass), transparent 50%),
    radial-gradient(ellipse 3px 10px at 12% 95%, var(--aero-grass), transparent 50%),
    radial-gradient(ellipse 3px 14px at 20% 88%, var(--aero-grass), transparent 50%),
    radial-gradient(ellipse 3px 11px at 28% 92%, var(--aero-grass), transparent 50%),
    radial-gradient(ellipse 3px 13px at 36% 90%, var(--aero-grass), transparent 50%),
    radial-gradient(ellipse 3px 10px at 44% 94%, var(--aero-grass), transparent 50%),
    radial-gradient(ellipse 3px 15px at 52% 87%, var(--aero-grass), transparent 50%),
    radial-gradient(ellipse 3px 12px at 60% 93%, var(--aero-grass), transparent 50%),
    radial-gradient(ellipse 3px 10px at 68% 91%, var(--aero-grass), transparent 50%),
    radial-gradient(ellipse 3px 13px at 76% 89%, var(--aero-grass), transparent 50%),
    radial-gradient(ellipse 3px 11px at 84% 94%, var(--aero-grass), transparent 50%),
    radial-gradient(ellipse 3px 14px at 92% 88%, var(--aero-grass), transparent 50%);
  animation: grassSway 4s ease-in-out infinite alternate;
}
@keyframes grassSway {
  0% { transform: skewX(0deg); }
  100% { transform: skewX(1.5deg); }
}

/* ===================== Floating Bubbles ===================== */
.bubbles {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 3; overflow: hidden;
}
.bubble {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6), rgba(129,212,250,0.2) 60%, transparent 70%);
  border: 1px solid rgba(255,255,255,0.3);
  animation: bubbleRise linear infinite;
}
@keyframes bubbleRise {
  0%   { transform: translateY(100vh) translateX(0) scale(0.8); opacity: 0; }
  10%  { opacity: 0.7; transform: translateY(90vh) translateX(5px) scale(1); }
  50%  { transform: translateY(50vh) translateX(var(--drift, 20px)) scale(1.05); }
  90%  { opacity: 0.5; }
  100% { transform: translateY(-20vh) translateX(calc(var(--drift, 20px) * -1)) scale(0.9); opacity: 0; }
}

/* ===================== Bokeh ===================== */
.bokeh {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 2;
}
.bokeh span {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
  filter: blur(2px);
  animation: bokehFloat ease-in-out infinite alternate;
}
@keyframes bokehFloat {
  0%   { transform: translate(0, 0); }
  100% { transform: translate(15px, -20px); }
}

/* ===================== Light Sweep ===================== */
.light-sweep {
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  z-index: 4;
  pointer-events: none;
  background: linear-gradient(
    105deg,
    transparent 40%,
    rgba(255,255,255,0.04) 45%,
    rgba(255,255,255,0.08) 50%,
    rgba(255,255,255,0.04) 55%,
    transparent 60%
  );
  animation: lightSweep 12s ease-in-out infinite;
}
@keyframes lightSweep {
  0%   { transform: translateX(-30%) translateY(0); }
  100% { transform: translateX(30%) translateY(10%); }
}

/* ===================== Center Link ===================== */
.center-link-wrap {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  text-align: center;
}

/* Glass orb (same as index.html logo orb) */
.bg-orb {
  width: 90px; height: 90px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #fff, rgba(0,229,255,0.7) 40%, rgba(2,136,209,0.8) 80%);
  box-shadow: 0 0 40px rgba(0,229,255,0.5), inset 0 -6px 12px rgba(0,80,160,0.3);
  animation: orbPulse 3s ease-in-out infinite;
  position: relative;
  margin: 0 auto 20px;
}
.bg-orb::after {
  content: '';
  position: absolute;
  top: 8%; left: 20%;
  width: 35%; height: 25%;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.9), transparent 70%);
  filter: blur(1px);
  animation: orbShimmer 4s ease-in-out infinite;
}
@keyframes orbShimmer {
  0%, 100% { opacity: 0.7; transform: scale(1); }
  50%      { opacity: 1; transform: scale(1.1); }
}
@keyframes orbPulse {
  0%, 100% { box-shadow: 0 0 40px rgba(0,229,255,0.5), inset 0 -6px 12px rgba(0,80,160,0.3); }
  50%      { box-shadow: 0 0 70px rgba(0,229,255,0.8), inset 0 -6px 12px rgba(0,80,160,0.3); }
}

/* Glass button */
.enter-btn {
  display: inline-block;
  padding: 14px 40px;
  text-decoration: none;
  font-size: 1rem;
  font-weight: 500;
  color: #fff;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(14px) saturate(1.4);
  -webkit-backdrop-filter: blur(14px) saturate(1.4);
  border: 1px solid rgba(255,255,255,0.6);
  border-radius: 14px;
  box-shadow:
    0 4px 24px rgba(0,80,160,0.25),
    inset 0 1px 1px rgba(255,255,255,0.7),
    inset 0 -1px 1px rgba(0,80,160,0.1);
  transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
  position: relative;
  overflow: hidden;
  letter-spacing: 1px;
}
/* Glass top reflection */
.enter-btn::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 50%;
  border-radius: 14px 14px 50% 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.35), transparent);
  pointer-events: none;
}
/* Shimmer sweep */
.enter-btn::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  transition: left 0.6s ease;
}
.enter-btn:hover {
  transform: translateY(-3px) scale(1.05);
  background: rgba(255,255,255,0.35);
  box-shadow: 0 8px 32px rgba(0,229,255,0.4), inset 0 1px 1px rgba(255,255,255,0.8);
}
.enter-btn:hover::after { left: 150%; }
.enter-btn:active {
  transform: translateY(0) scale(1.02);
  transition-duration: 0.1s;
}

/* Subtitle */
.bg-subtitle {
  color: rgba(255,255,255,0.7);
  font-size: 0.85rem;
  font-weight: 300;
  margin-top: 14px;
  text-shadow: 0 1px 6px rgba(0,40,80,0.4);
  letter-spacing: 2px;
  animation: subtitleBreathe 3s ease-in-out infinite;
}
@keyframes subtitleBreathe {
  0%, 100% { opacity: 0.5; }
  50%      { opacity: 0.9; }
}

/* ===================== Mouse Glow Follower ===================== */
.mouse-glow {
  position: fixed;
  width: 300px; height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,229,255,0.06), transparent 70%);
  pointer-events: none;
  z-index: 6;
  transform: translate(-50%, -50%);
  transition: opacity 0.3s ease;
  opacity: 0;
}

/* ===================== Back link (on index.html side, handled here too) ===================== */
.back-hint {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  color: rgba(255,255,255,0.4);
  font-size: 0.75rem;
  letter-spacing: 1px;
}
</style>
</head>
<body>

<!-- Aurora Background -->
<div class="aurora-bg"></div>

<!-- Bokeh -->
<div class="bokeh" id="bokeh"></div>

<!-- Light Sweep -->
<div class="light-sweep"></div>

<!-- Floating Bubbles -->
<div class="bubbles" id="bubbles"></div>

<!-- Grass Layer -->
<div class="grass-layer"></div>

<!-- Mouse Glow -->
<div class="mouse-glow" id="mouseGlow"></div>

<!-- Center: Orb + Enter Link -->
<div class="center-link-wrap">
  <div class="bg-orb"></div>
  <a href="index.html" class="enter-btn">🌊 进入 Aqua Blog</a>
  <p class="bg-subtitle">Authentic · Energetic · Reflective · Open</p>
</div>

<!-- Back hint -->
<div class="back-hint">Frutiger Aero Background · 本网页由GLM5.2和openclaw完成</div>

<script>
/* ===================== Generate Bubbles ===================== */
(function() {
  const container = document.getElementById('bubbles');
  const count = 24;
  for (let i = 0; i < count; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 8 + Math.random() * 50;
    b.style.width = size + 'px';
    b.style.height = size + 'px';
    b.style.left = Math.random() * 100 + '%';
    b.style.animationDuration = (8 + Math.random() * 12) + 's';
    b.style.animationDelay = (Math.random() * 10) + 's';
    b.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
    container.appendChild(b);
  }
})();

/* ===================== Generate Bokeh ===================== */
(function() {
  const container = document.getElementById('bokeh');
  const count = 16;
  for (let i = 0; i < count; i++) {
    const s = document.createElement('span');
    const size = 60 + Math.random() * 140;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDuration = (4 + Math.random() * 6) + 's';
    s.style.animationDelay = (Math.random() * 4) + 's';
    container.appendChild(s);
  }
})();

/* ===================== Mouse Glow Follower ===================== */
(function() {
  const glow = document.getElementById('mouseGlow');
  let timer = null;
  document.addEventListener('mousemove', e => {
    glow.style.left = e.clientX + 'px';
    glow.style.top = e.clientY + 'px';
    glow.style.opacity = '1';
    clearTimeout(timer);
    timer = setTimeout(() => glow.style.opacity = '0', 2000);
  });
})();
</script>

</body>
</html>
